name: Build ExecVal (3 platforms)

# Part 1: manual trigger only. Produces downloadable artifacts for testing.
# Releases are added later (Part 2, cross-repo sync).
on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # let other platforms finish even if one fails
      matrix:
        include:
          - os: windows-latest
            artifact: AutoBIDSify-Windows
            archive: zip
          - os: macos-latest          # Apple Silicon (arm64)
            artifact: AutoBIDSify-macOS-arm64
            archive: zip
          - os: ubuntu-latest
            artifact: AutoBIDSify-Linux
            archive: tar

    defaults:
      run:
        working-directory: execval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pywebview needs WebKitGTK on Linux; the runner has sudo to install it.
      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 || \
          sudo apt-get install -y \
            libgirepository1.0-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.0
          python -m pip install pycairo PyGObject

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyinstaller

      - name: Run unit tests
        run: python -m pytest

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      # --- package the onedir output per platform ---
      - name: Archive (zip, Windows/macOS)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Compress-Archive -Path AutoBIDSify -DestinationPath ${{ matrix.artifact }}.zip"
          else
            zip -r ${{ matrix.artifact }}.zip AutoBIDSify
          fi

      - name: Archive (tar.gz, Linux)
        if: matrix.archive == 'tar'
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz AutoBIDSify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            execval/dist/${{ matrix.artifact }}.zip
            execval/dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore
          retention-days: 14
